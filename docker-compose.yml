services:
  postgres:
    image: postgres:17
    container_name: backend-pg
    environment:
      POSTGRES_USER: docker
      POSTGRES_PASSWORD: docker
      POSTGRES_DB: backend-pg
    ports:
      - '5432:5432'

  redis:
    image: redis:7
    container_name: backend-redis
    ports:
      - '6379:6379'
